<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>photo by riz — Printable QR Poster (A4)</title>
<meta name="description" content="Printable A4 poster — scan the QR to book a shoot or save Rizkha Fauziah's contact." />

<!-- ╔════════════════════════════════════════════════════════════╗
     ║  PRINT ME → press the button, or Ctrl/Cmd-P, "Save as PDF". ║
     ║  Sized for A4. The QR points to the live contact card.      ║
     ║  Edit POSTER_URL / handles in the <script> CONFIG below.    ║
     ╚════════════════════════════════════════════════════════════╝ -->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  :root{
    --paper:   #F5F0E8;
    --paper-2: #EFE8DC;
    --ink:     #2B2724;
    --ink-soft:#6B6259;
    --clay:    #B5704D;
    --clay-dk: #9A5C3D;
    --line:    #DAD0C2;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    font-family:"Inter", system-ui, sans-serif;
    color:var(--ink);
    background:#cfc7b8;            /* grey desk behind the sheet (screen only) */
    display:flex; flex-direction:column; align-items:center;
    padding:28px 14px 60px;
    -webkit-font-smoothing:antialiased;
  }

  /* ── A4 sheet ─────────────────────────────────────────────── */
  .page{
    position:relative;
    width:210mm; height:297mm;
    background:
      radial-gradient(130% 80% at 50% -5%, var(--paper) 0%, var(--paper-2) 100%);
    box-shadow:0 18px 50px -20px rgba(0,0,0,.5);
    display:flex; flex-direction:column; align-items:center;
    text-align:center;
    padding:26mm 20mm;
    overflow:hidden;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }
  /* film grain */
  .page::after{
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.045;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  /* clay frame */
  .page::before{
    content:""; position:absolute; inset:10mm;
    border:1.5px solid var(--clay); border-radius:6mm; pointer-events:none; opacity:.55;
  }

  .stack{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; height:100%; width:100%; }

  .kicker{
    font-size:13px; letter-spacing:.5em; text-transform:uppercase;
    color:var(--clay); font-weight:600; margin-bottom:14mm;
  }

  .mark{ width:74px; height:74px; margin-bottom:8mm; }
  .mark circle, .mark path{ stroke:var(--clay); }

  .name{
    font-family:"Cormorant Garamond", serif;
    font-weight:600; font-size:64px; line-height:1; letter-spacing:.5px;
  }
  .role{
    margin-top:5mm; font-size:15px; letter-spacing:.28em;
    text-transform:uppercase; color:var(--ink-soft); font-weight:500;
  }

  .rule{ width:70px; height:3px; background:var(--clay); border-radius:3px; margin:11mm 0; }

  /* ── QR ───────────────────────────────────────────────────── */
  .qr-card{
    background:#fff; border:1px solid var(--line); border-radius:8mm;
    padding:12mm; width:96mm; height:96mm;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 30px -18px rgba(43,39,36,.6);
  }
  .qr-card svg{ width:100%; height:100%; display:block; }

  .cta{
    margin-top:10mm;
    font-family:"Cormorant Garamond", serif;
    font-size:40px; font-weight:600; line-height:1.1;
  }
  .cta b{ color:var(--clay); }
  .sub{
    margin-top:3mm; font-size:15px; letter-spacing:.05em; color:var(--ink-soft);
  }

  .spacer{ flex:1; }

  .foot{
    width:100%; border-top:1px solid var(--line); padding-top:6mm;
    display:flex; justify-content:center; gap:10mm; flex-wrap:wrap;
    font-size:14px; letter-spacing:.04em; color:var(--ink);
  }
  .foot .item{ display:flex; align-items:center; gap:6px; }
  .foot svg{ width:16px; height:16px; color:var(--clay); }
  .foot .brand{ color:var(--ink-soft); }

  /* ── Print toolbar (screen only) ──────────────────────────── */
  .bar{
    position:fixed; left:50%; transform:translateX(-50%); bottom:18px; z-index:50;
    display:flex; gap:10px; align-items:center;
    background:var(--ink); color:#fff; padding:10px 12px 10px 16px;
    border-radius:999px; box-shadow:0 12px 30px -10px rgba(0,0,0,.6);
    font-size:13.5px;
  }
  .bar button{
    font-family:inherit; font-size:13.5px; font-weight:600; cursor:pointer;
    background:var(--clay); color:#fff; border:none; border-radius:999px;
    padding:9px 16px; transition:background .2s ease;
  }
  .bar button:hover{ background:#c8845f; }
  .bar .hint{ opacity:.8; }

  /* ── PRINT ────────────────────────────────────────────────── */
  @page{ size:A4 portrait; margin:0; }
  @media print{
    body{ background:#fff; padding:0; }
    .page{ box-shadow:none; width:210mm; height:297mm; }
    .bar{ display:none !important; }
  }
</style>
</head>
<body>
  <div class="page">
    <div class="stack">
      <div class="kicker">photo&nbsp;by&nbsp;riz</div>

      <svg class="mark" viewBox="0 0 48 48" fill="none" stroke-width="1.3" aria-hidden="true">
        <circle cx="24" cy="24" r="18"/>
        <path d="M24 6 L33 21 L15 21 Z M42 24 L27 33 L27 15 Z M24 42 L15 27 L33 27 Z M6 24 L21 15 L21 33 Z" stroke-linejoin="round" fill="none"/>
        <circle cx="24" cy="24" r="5"/>
      </svg>

      <h1 class="name">Rizkha Fauziah</h1>
      <p class="role">Food · Product · Motion</p>

      <div class="rule"></div>

      <div class="qr-card" id="qr"></div>

      <p class="cta">Scan to <b>book a shoot</b></p>
      <p class="sub">or save my contact &amp; portfolio — point your camera at the code</p>

      <div class="spacer"></div>

      <div class="foot">
        <span class="item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          @photobyriz
        </span>
        <span class="item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>
          photobyriz.com
        </span>
        <span class="item brand">© <span id="yr"></span> Rizkha Fauziah</span>
      </div>
    </div>
  </div>

  <div class="bar">
    <span class="hint">Tip: print at 100% scale, or “Save as PDF”.</span>
    <button onclick="window.print()">🖨 Print / Save as PDF</button>
  </div>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script>
/* ── CONFIG ─────────────────────────────────────────────────── */
const POSTER_URL = "https://ahmedabdirahman1-max.github.io/photobyriz-card/"; // what the QR opens
/* ───────────────────────────────────────────────────────────── */

document.getElementById("yr").textContent = new Date().getFullYear();

function renderQR(){
  const box = document.getElementById("qr");
  try{
    const qr = qrcode(0, "M");
    qr.addData(POSTER_URL);
    qr.make();
    const n = qr.getModuleCount();
    const pad = 2;
    const size = n + pad * 2;
    let rects = "";
    for (let r = 0; r < n; r++)
      for (let c = 0; c < n; c++)
        if (qr.isDark(r, c))
          rects += '<rect x="'+(c+pad)+'" y="'+(r+pad)+'" width="1.02" height="1.02"/>';
    box.innerHTML =
      '<svg viewBox="0 0 '+size+' '+size+'" shape-rendering="crispEdges" '+
      'xmlns="http://www.w3.org/2000/svg" fill="#2B2724">'+
      '<rect width="'+size+'" height="'+size+'" fill="#ffffff"/>'+rects+'</svg>';
  }catch(e){
    box.innerHTML = '<span style="color:#9A5C3D;font-size:13px">QR engine offline — reconnect to load.</span>';
  }
}
if (window.qrcode) renderQR();
else window.addEventListener("load", () => window.qrcode && renderQR());
</script>
</body>
</html>
