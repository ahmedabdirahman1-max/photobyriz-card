<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rizkha Fauziah — Contact Card</title>
<meta name="description" content="Digital contact card for Rizkha Fauziah — food, product & motion photography. Scan to save, email, or book a shoot." />

<!-- ╔══════════════════════════════════════════════════════════════════╗
     ║  photo by riz · digital contact card                             ║
     ║  EDIT YOUR DETAILS IN ONE PLACE → the CONFIG block in <script>.  ║
     ║  Everything (QR vCard, Email button, Calendly button, socials)   ║
     ║  rebuilds automatically from those values.                       ║
     ╚══════════════════════════════════════════════════════════════════╝ -->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

<!-- Calendly assets (the "calendly plugin") -->
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />

<style>
  :root{
    /* ── Brand palette: warm minimalist ─────────────────────────── */
    --paper:   #F5F0E8;   /* cream / ivory background  */
    --paper-2: #EFE8DC;   /* slightly deeper cream     */
    --ink:     #2B2724;   /* charcoal text / QR        */
    --ink-soft:#6B6259;   /* muted brown-grey text     */
    --clay:    #B5704D;   /* terracotta / clay accent  */
    --clay-dk: #9A5C3D;   /* clay hover                */
    --line:    #DAD0C2;   /* hairline dividers         */
    --card-sh: 0 24px 60px -28px rgba(43,39,36,.45);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{ height:100%; }

  body{
    font-family:"Inter", system-ui, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 50% -10%, var(--paper) 0%, var(--paper-2) 100%);
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 18px;
    -webkit-font-smoothing:antialiased;
  }

  /* subtle film-grain overlay for the photography feel */
  body::after{
    content:"";
    position:fixed; inset:0; pointer-events:none; opacity:.05; z-index:0;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ── The card ───────────────────────────────────────────────── */
  .card{
    position:relative; z-index:1;
    width:100%; max-width:380px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:20px;
    box-shadow:var(--card-sh);
    padding:38px 34px 30px;
    text-align:center;
    overflow:hidden;
  }
  /* thin clay frame inside the card edge */
  .card::before{
    content:""; position:absolute; inset:10px;
    border:1px solid var(--line); border-radius:13px; pointer-events:none;
  }

  .kicker{
    font-size:11px; letter-spacing:.34em; text-transform:uppercase;
    color:var(--clay); font-weight:600; margin-bottom:18px;
  }

  /* aperture monogram */
  .mark{ width:46px; height:46px; margin:0 auto 14px; display:block; }
  .mark circle, .mark path{ stroke:var(--clay); }

  .name{
    font-family:"Cormorant Garamond", serif;
    font-weight:600; font-size:40px; line-height:1.02;
    letter-spacing:.5px; color:var(--ink);
  }
  .role{
    margin-top:9px; font-size:12.5px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--ink-soft); font-weight:500;
  }

  .rule{
    width:54px; height:2px; background:var(--clay);
    margin:20px auto; border-radius:2px;
  }

  /* ── QR ─────────────────────────────────────────────────────── */
  .qr-wrap{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    width:188px; height:188px;
    margin:0 auto 10px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px -12px rgba(43,39,36,.5);
  }
  .qr-wrap svg{ width:100%; height:100%; display:block; }
  .qr-cap{
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-soft); margin-bottom:22px;
  }
  .qr-cap b{ color:var(--clay); font-weight:600; }

  /* ── Buttons ────────────────────────────────────────────────── */
  .actions{ display:flex; flex-direction:column; gap:10px; }

  .btn{
    display:flex; align-items:center; justify-content:center; gap:9px;
    width:100%; padding:13px 16px;
    font-family:"Inter",sans-serif; font-size:14px; font-weight:500;
    letter-spacing:.02em; text-decoration:none; cursor:pointer;
    border-radius:11px; border:1px solid transparent;
    transition:transform .12s ease, background .2s ease, color .2s ease, border-color .2s ease;
  }
  .btn:active{ transform:translateY(1px); }
  .btn svg{ width:17px; height:17px; flex:none; }

  .btn-primary{ background:var(--clay); color:#fff; }
  .btn-primary:hover{ background:var(--clay-dk); }

  .btn-ghost{
    background:transparent; color:var(--ink); border-color:var(--line);
  }
  .btn-ghost:hover{ border-color:var(--clay); color:var(--clay); }

  .mini{ display:flex; gap:10px; margin-top:4px; }
  .mini .btn{ flex:1; padding:11px; font-size:13px; }

  .foot{
    margin-top:22px; font-size:11px; letter-spacing:.08em;
    color:var(--ink-soft);
  }
  .foot a{ color:var(--clay); text-decoration:none; }

  /* placeholder warning banner (auto-hides once details are filled) */
  .todo{
    display:none; margin:0 0 18px; padding:10px 12px;
    background:#FBEEE6; border:1px solid #E7C6B2; border-radius:9px;
    font-size:11.5px; line-height:1.45; color:var(--clay-dk); text-align:left;
  }
  .todo.show{ display:block; }
  .todo code{ font-family:ui-monospace,Menlo,monospace; font-size:11px; }

  @media (max-width:420px){
    .card{ padding:32px 22px 26px; }
    .name{ font-size:34px; }
  }
</style>
</head>
<body>
  <main class="card" role="contactinfo">
    <div class="todo" id="todo"></div>

    <div class="kicker">photo&nbsp;by&nbsp;riz</div>

    <!-- aperture mark -->
    <svg class="mark" viewBox="0 0 48 48" fill="none" stroke-width="1.4" aria-hidden="true">
      <circle cx="24" cy="24" r="18"/>
      <path d="M24 6 L33 21 L15 21 Z M42 24 L27 33 L27 15 Z M24 42 L15 27 L33 27 Z M6 24 L21 15 L21 33 Z" stroke-linejoin="round" fill="none"/>
      <circle cx="24" cy="24" r="5"/>
    </svg>

    <h1 class="name" id="name">Rizkha Fauziah</h1>
    <p class="role" id="role">Food · Product · Motion</p>

    <div class="rule"></div>

    <div class="qr-wrap" id="qr" aria-label="Scan to save contact"></div>
    <p class="qr-cap">Scan to <b>save my contact</b></p>

    <div class="actions">
      <a class="btn btn-primary" id="book">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Book a shoot
      </a>
      <a class="btn btn-ghost" id="email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
        Email me
      </a>
      <div class="mini">
        <a class="btn btn-ghost" id="ig">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          Instagram
        </a>
        <a class="btn btn-ghost" id="site">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>
          Website
        </a>
      </div>
      <a class="btn btn-ghost" id="save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        Download .vcf contact
      </a>
    </div>

    <p class="foot" id="foot">© <span id="yr"></span> Rizkha Fauziah</p>
  </main>

<!-- QR generator (the engine behind the "barcode") -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<!-- Calendly popup engine (the "calendly plugin") -->
<script src="https://assets.calendly.com/assets/external/widget.js" async></script>

<script>
/* ════════════════════════════════════════════════════════════════
   CONFIG — edit these values, everything else updates automatically.
   Leave any field as its "TODO_" placeholder and it will be skipped
   gracefully (and flagged in the banner at the top of the card).
   ════════════════════════════════════════════════════════════════ */
const CONFIG = {
  firstName : "Rizkha",
  lastName  : "Fauziah",
  brand     : "photo by riz",
  title     : "Food, Product & Motion Photographer",
  roleLine  : "Food · Product · Motion",

  email     : "photographybyriz@gmail.com",
  phone     : "",                                    // add a number to show a Call line (or leave "" to omit)
  calendly  : "https://calendly.com/photographybyriz/30min",
  instagram : "https://instagram.com/photobyriz",
  website   : "https://photobyriz.com",
  location  : ""                                     // optional, e.g. "Minneapolis, MN"
};
/* ════════════════════════════════════════════════════════════════ */

const isSet = (v) => v && !String(v).startsWith("TODO_");
const $ = (id) => document.getElementById(id);

/* ---- Text bindings ---- */
$("name").textContent = (CONFIG.firstName + " " + CONFIG.lastName).trim();
$("role").textContent = CONFIG.roleLine;
$("foot").innerHTML = "© <span>" + new Date().getFullYear() + "</span> " +
  CONFIG.firstName + " " + CONFIG.lastName +
  (isSet(CONFIG.location) ? " · " + CONFIG.location : "");

/* ---- Build the vCard string ---- */
function buildVCard(){
  const L = [
    "BEGIN:VCARD","VERSION:3.0",
    "N:" + CONFIG.lastName + ";" + CONFIG.firstName + ";;;",
    "FN:" + CONFIG.firstName + " " + CONFIG.lastName,
    "ORG:" + CONFIG.brand,
    "TITLE:" + CONFIG.title
  ];
  if (isSet(CONFIG.email))    L.push("EMAIL;TYPE=INTERNET:" + CONFIG.email);
  if (isSet(CONFIG.phone))    L.push("TEL;TYPE=CELL:" + CONFIG.phone);
  if (isSet(CONFIG.website))  L.push("URL:" + CONFIG.website);
  if (isSet(CONFIG.instagram))L.push("X-SOCIALPROFILE;TYPE=instagram:" + CONFIG.instagram);
  if (isSet(CONFIG.location)) L.push("ADR;TYPE=WORK:;;" + CONFIG.location + ";;;;");
  L.push("END:VCARD");
  return L.join("\r\n");
}
const VCARD = buildVCard();

/* ---- Render the QR as crisp, on-brand SVG (charcoal on white) ---- */
function renderQR(){
  const box = $("qr");
  try{
    const qr = qrcode(0, "M");      // auto type, medium error correction
    qr.addData(VCARD);
    qr.make();
    const n = qr.getModuleCount();
    const pad = 2;                   // quiet zone (modules)
    const size = n + pad * 2;
    let rects = "";
    for (let r = 0; r < n; r++){
      for (let c = 0; c < n; c++){
        if (qr.isDark(r, c)){
          rects += '<rect x="' + (c + pad) + '" y="' + (r + pad) +
                   '" width="1.02" height="1.02"/>';
        }
      }
    }
    box.innerHTML =
      '<svg viewBox="0 0 ' + size + ' ' + size + '" shape-rendering="crispEdges" ' +
      'xmlns="http://www.w3.org/2000/svg" fill="#2B2724">' +
      '<rect width="' + size + '" height="' + size + '" fill="#ffffff"/>' +
      rects + '</svg>';
  }catch(e){
    box.innerHTML = '<span style="font-size:11px;color:#9A5C3D;padding:10px;text-align:center">' +
      'QR engine offline.<br>Reconnect to load.</span>';
  }
}
if (window.qrcode) renderQR();
else window.addEventListener("load", () => window.qrcode ? renderQR() : null);

/* ---- Buttons ---- */
// Email
if (isSet(CONFIG.email)){
  $("email").href = "mailto:" + CONFIG.email +
    "?subject=" + encodeURIComponent("Photography enquiry");
}else{
  $("email").href = "#"; $("email").style.opacity = .5;
  $("email").addEventListener("click", e => e.preventDefault());
}

// Instagram & Website
$("ig").href   = CONFIG.instagram; $("ig").target = "_blank"; $("ig").rel = "noopener";
$("site").href = CONFIG.website;   $("site").target = "_blank"; $("site").rel = "noopener";

// Calendly — opens popup if the plugin loaded, otherwise opens the link
const bookBtn = $("book");
if (isSet(CONFIG.calendly)){
  bookBtn.href = CONFIG.calendly;
  bookBtn.addEventListener("click", function(e){
    if (window.Calendly && typeof Calendly.initPopupWidget === "function"){
      e.preventDefault();
      Calendly.initPopupWidget({ url: CONFIG.calendly });
    }else{
      bookBtn.target = "_blank"; bookBtn.rel = "noopener"; // fall back to normal link
    }
  });
}else{
  bookBtn.href = "#"; bookBtn.style.opacity = .5;
  bookBtn.addEventListener("click", e => e.preventDefault());
}

// Download .vcf
$("save").addEventListener("click", function(e){
  e.preventDefault();
  const blob = new Blob([VCARD], { type: "text/vcard;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = (CONFIG.firstName + "-" + CONFIG.lastName + ".vcf").replace(/\s+/g,"-");
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
});

/* ---- Placeholder reminder banner (only visible while TODOs remain) ---- */
(function(){
  const missing = [];      // only required fields trigger the setup banner
  if (!isSet(CONFIG.email))    missing.push("email");
  if (!isSet(CONFIG.calendly)) missing.push("calendly");
  if (missing.length){
    const t = $("todo");
    t.classList.add("show");
    t.innerHTML = "<b>Setup:</b> still using placeholders for <code>" +
      missing.join("</code>, <code>") + "</code>. " +
      "Open this file and edit the <code>CONFIG</code> block near the bottom — " +
      "the QR, buttons &amp; download all update automatically.";
  }
})();
</script>
</body>
</html>
